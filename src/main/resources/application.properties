spring.application.name=blog-app-apis
server.port=9090

#db config
spring.datasource.url=jdbc:mysql://localhost:3306/blog_app_apis
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false


sping.servlet.multipart.max-file-size=100MB
spring.servlet.multipart,max-request-size=100MB

project.image=images/

logging.level.org.springframework.security=DEBUG
spring.security.user.name=Sanket
spring.security.user.password=sanket
spring.security.user.roles=ADMIN

jwt.secret=your-very-long-secret-key-at-least-32-bytes
jwt.expiration=18000